# fly.toml — Fly.io config for binance-alpha-tracker
# Окремий додаток від OKX bot. Не впливає на нього.

app = 'binance-alpha-tracker'
primary_region = 'arn'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
